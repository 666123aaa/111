<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>规训视角 - 空间层次增强版</title>
    <style>
    body { margin: 0; overflow: hidden; background-color: #1a1a1a; } /* 改成深灰色 */
    </style>
</head>
<body>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    let scene, camera, renderer, mesh, controls, layers = [];

    init();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 0.1); 

        const loader = new THREE.TextureLoader();
        
        // 1. 底层：你的原图 (1.png)
        const geometry = new THREE.SphereGeometry(500, 64, 32);
        geometry.scale(-1, 1, 1);
        loader.load('1.png', (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace;

            // --- 新增：提升画质的参数 ---
    texture.minFilter = THREE.LinearFilter; // 减少远处的锯齿
    texture.magFilter = THREE.LinearFilter; // 增加近处的平滑度
    texture.anisotropy = renderer.capabilities.getMaxAnisotropy(); // 开启最大各向异性过滤，斜着看更清晰
    // -------------------------
            const material = new THREE.MeshBasicMaterial({ map: texture });
            mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.y = -Math.PI / 2;
            scene.add(mesh);
        });


        

        // 2. 核心补救：添加一个“近景层”来制造立体感
        // 我们在相机前面放一个半透明的深色遮罩，模拟婴儿床边缘的模糊阴影
        const overlayGeo = new THREE.TorusGeometry(2, 0.5, 16, 100);
        const overlayMat = new THREE.MeshBasicMaterial({ 
            color: 0x000000, 
            transparent: true, 
            opacity: 0,
            
            side: THREE.DoubleSide 
        });
        const overlay = new THREE.Mesh(overlayGeo, overlayMat);
        overlay.position.z = -2; // 放在你眼前
        scene.add(overlay);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true; 
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = false;
        controls.rotateSpeed = -1.5; // 提高灵敏度
        controls.enableDamping = true; // 增加丝滑感
        
        // 锁死视野，防止黑边
        controls.minAzimuthAngle = -Math.PI / 3.5;
        controls.maxAzimuthAngle = Math.PI / 3.5;
        controls.minPolarAngle = 1.0;
        controls.maxPolarAngle = 1.9;

        renderer.setAnimationLoop(animate);
    }

   function animate() {
    const time = Date.now() * 0.001;

    // 1. 如果是在 Pico 4 里面看 (VR 模式)
    if (renderer.xr.isPresenting) {
        // 设置限制角度（PI/2.5 约为 72度，左右加起来 144度，能看到大部分正面但转不到脑后）
        const limit = Math.PI / 2.1; 
        
        // 关键：在渲染画面之前，强行把“想看后面”的相机旋转拽回来
        if (camera.rotation.y > limit) {
            camera.rotation.y = limit; 
        } else if (camera.rotation.y < -limit) {
            camera.rotation.y = -limit;
        }
        
        // 如果想让低头也穿帮不了，可以加上这两行限制上下看的高度
        if (camera.rotation.x > 0.5) camera.rotation.x = 0.5; // 限制抬头
        if (camera.rotation.x < -0.5) camera.rotation.x = -0.5; // 限制低头
        
    } else {
        // 2. 如果是在电脑浏览器上看 (非 VR 模式)
        // 保持你原有的身体微调效果，增加“呼吸感”
        camera.position.y = Math.sin(time * 0.4) * 0.03;
        camera.position.x = Math.cos(time * 0.3) * 0.01;
        controls.update(); 
    }

    // 最后执行渲染：不管是 VR 还是网页，都按上面修正后的视角出图
    renderer.render(scene, camera);
}
</script>
</body>
</html>
