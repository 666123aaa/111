<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>规训视角 - 空间层次增强版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
</head>
<body>
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    let scene, camera, renderer, mesh, controls, layers = [];

    init();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 0.1); 

        const loader = new THREE.TextureLoader();
        
        // 1. 底层：你的原图 (1.png)
        const geometry = new THREE.SphereGeometry(500, 64, 32);
        geometry.scale(-1, 1, 1);
        loader.load('1.png', (texture) => {
            texture.colorSpace = THREE.SRGBColorSpace;
            const material = new THREE.MeshBasicMaterial({ map: texture });
            mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.y = -Math.PI / 2;
            scene.add(mesh);
        });

        // 2. 核心补救：添加一个“近景层”来制造立体感
        // 我们在相机前面放一个半透明的深色遮罩，模拟婴儿床边缘的模糊阴影
        const overlayGeo = new THREE.TorusGeometry(2, 0.5, 16, 100);
        const overlayMat = new THREE.MeshBasicMaterial({ 
            color: 0x000000, 
            transparent: true, 
            opacity: 0,
            
            side: THREE.DoubleSide 
        });
        const overlay = new THREE.Mesh(overlayGeo, overlayMat);
        overlay.position.z = -2; // 放在你眼前
        scene.add(overlay);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true; 
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = false;
        controls.rotateSpeed = -1.5; // 提高灵敏度
        controls.enableDamping = true; // 增加丝滑感
        
        // 锁死视野，防止黑边
        controls.minAzimuthAngle = -Math.PI / 3.5;
        controls.maxAzimuthAngle = Math.PI / 3.5;
        controls.minPolarAngle = 1.0;
        controls.maxPolarAngle = 2.2;

        renderer.setAnimationLoop(animate);
    }

    function animate() {
        const time = Date.now() * 0.001;
        if (!renderer.xr.isPresenting) {
            // 模拟身体的微小晃动
            camera.position.y = Math.sin(time * 0.4) * 0.03;
            camera.position.x = Math.cos(time * 0.3) * 0.01;
            controls.update(); 
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
