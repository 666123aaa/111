<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>规训视角 - 视频规训版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: "Microsoft YaHei", sans-serif; }
        /* 引导点击层：解决浏览器禁止自动播放视频的问题 */
        #start-mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="start-mask">
        <h2 style="font-weight: lighter; letter-spacing: 5px;">点击进入监视视角</h2>
        <p style="font-size: 12px; opacity: 0.5;">CLICK TO START MONITORING</p>
    </div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    let scene, camera, renderer, video, controls;
    const mask = document.getElementById('start-mask');

    // 点击后才启动，防止视频无法播放
    mask.addEventListener('click', () => {
        mask.style.display = 'none';
        init();
    });

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 0.1); 

        // 1. 视频纹理配置 (112.mp4)
        video = document.createElement('video');
        video.src = '112.mp4'; 
        video.loop = true;
        video.muted = true; // 必须静音，Pico 才能秒开
        video.playsInline = true;
        video.play();

        const videoTexture = new THREE.VideoTexture(video);
        videoTexture.colorSpace = THREE.SRGBColorSpace;
        
        // 保留你要求的画质增强参数
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        // 2. 视频球体
        const geometry = new THREE.SphereGeometry(500, 64, 32);
        geometry.scale(-1, 1, 1);
        const material = new THREE.MeshBasicMaterial({ map: videoTexture });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.y = -Math.PI / 2;
        scene.add(mesh);

        // 3. 背后遮罩文字 (往前走，别回头)
      // 3. 背后全息光幕文字 (往前走，别回头)
const canvas = document.createElement('canvas');
canvas.width = 1024; canvas.height = 512;
const ctx = canvas.getContext('2d');

// 关键：背景设为透明，不要fillRect黑色
ctx.clearRect(0, 0, canvas.width, canvas.height);

// 给文字加一点外发光效果
ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
ctx.shadowBlur = 20;
ctx.fillStyle = 'white';
ctx.textAlign = 'center';

ctx.font = 'bold 80px "Microsoft YaHei", sans-serif';
ctx.fillText('往前走，别回头', 512, 220);
ctx.font = '40px Arial';
ctx.fillText("GO FORWARD, DON'T LOOK BACK", 512, 320);

const textTex = new THREE.CanvasTexture(canvas);
// 使用 SpriteMaterial 让它始终面向摄像机，或者用普通的 Mesh 并开启透明混合
const textMat = new THREE.MeshBasicMaterial({ 
    map: textTex, 
    transparent: true, 
    blending: THREE.AdditiveBlending, // 加法混合，制造发光感
    side: THREE.DoubleSide,
    opacity: 0.6 // 初始透明度
});

const textGeo = new THREE.PlaneGeometry(15, 7.5);
const textMesh = new THREE.Mesh(textGeo, textMat);

// 放置在背后稍微远一点的地方，增加空间感
textMesh.position.set(0, 0, 10); 
textMesh.rotation.y = Math.PI;
scene.add(textMesh);

        // 4. 渲染器配置 (保留高画质参数)
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true; 
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        // 5. 电脑端控制器
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = false;
        controls.rotateSpeed = -1.0; 
        controls.enableDamping = true;
        
        renderer.setAnimationLoop(animate);
    }

    function animate() {
        const time = Date.now() * 0.001;

        if (renderer.xr.isPresenting) {
            // 保留你最满意的 144度 (PI/2.5) 视角锁定
            const limit = Math.PI / 2.5; 
            
            if (camera.rotation.y > limit) camera.rotation.y = limit; 
            if (camera.rotation.y < -limit) camera.rotation.y = -limit;
            
            // 限制抬头低头，防止穿帮
            if (camera.rotation.x > 0.4) camera.rotation.x = 0.4;
            if (camera.rotation.x < -0.4) camera.rotation.x = -0.4;
            
        } else {
            if(controls) {
                camera.position.y = Math.sin(time * 0.4) * 0.03;
                camera.position.x = Math.cos(time * 0.3) * 0.01;
                controls.update(); 
            }
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
